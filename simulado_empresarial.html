<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado OAB – Direito Empresarial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(99,102,241,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-badge {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: #a5b4fc;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    border-radius: 999px;
    margin-bottom: 1rem;
  }
  .header h1 {
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    font-weight: 800;
    background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .header p { color: var(--text2); font-size: 0.95rem; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--text2);
    margin-bottom: 0.5rem;
  }
  .progress-track {
    background: var(--border);
    height: 6px;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 0.4rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    transition: border-color 0.3s;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .q-card.answered-correct { border-color: var(--success); }
  .q-card.answered-wrong { border-color: var(--danger); }

  .q-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 0.75rem;
    font-weight: 800;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .q-topic {
    font-size: 0.72rem;
    font-weight: 700;
    color: #a5b4fc;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .q-status {
    margin-left: auto;
    font-size: 1.1rem;
  }

  .q-body { padding: 1.25rem; }
  .q-text {
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.55rem; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(59,130,246,0.06);
  }
  .option .opt-label {
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    min-width: 18px;
  }
  .option.correct {
    border-color: var(--success) !important;
    background: rgba(16,185,129,0.08) !important;
  }
  .option.correct .opt-label { color: var(--success); }
  .option.wrong {
    border-color: var(--danger) !important;
    background: rgba(239,68,68,0.08) !important;
  }
  .option.wrong .opt-label { color: var(--danger); }
  .option:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.25);
    color: #6ee7b7;
  }
  .feedback.wrong-fb {
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
  }
  .feedback strong { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
  .feedback .law-ref {
    margin-top: 0.5rem;
    font-size: 0.78rem;
    color: var(--text3);
    font-style: italic;
  }

  /* SCOREBOARD */
  .score-panel {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.25rem;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
  }
  .score-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 0.75rem;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    margin-bottom: 0.35rem;
    color: var(--text2);
  }
  .score-row span:last-child { font-weight: 700; }
  .score-row.ok span:last-child { color: var(--success); }
  .score-row.nok span:last-child { color: var(--danger); }
  .score-row.pct span:last-child { color: var(--accent); }

  /* RESULT MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s;
  }
  .modal-overlay.show .modal { transform: scale(1); }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .modal h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .modal .modal-score {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0.75rem 0;
  }
  .modal p { color: var(--text2); font-size: 0.95rem; margin-bottom: 1.5rem; }
  .modal-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 0.85rem 2.5rem;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn:hover { opacity: 0.85; }

  /* RESET BTN */
  .reset-btn {
    display: block;
    margin: 2rem auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.75rem 2rem;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }
  .no-results p { font-size: 1.1rem; margin-top: 0.5rem; }

  @media (max-width: 600px) {
    .score-panel { bottom: 0; right: 0; left: 0; border-radius: 16px 16px 0 0; min-width: unset; display: flex; gap: 1rem; align-items: center; justify-content: space-around; }
    .score-title { display: none; }
    .score-row { flex-direction: column; align-items: center; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">FGV / OAB – Exame de Ordem</div>
  <h1>Simulado OAB – Direito Empresarial</h1>
  <p>60 questões objetivas com gabarito comentado</p>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="prog-label">0 de 60 respondidas</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterCards('all',this)">Todas (60)</button>
  <button class="filter-btn" onclick="filterCards('Empresário e Registro',this)">Empresário e Registro</button>
  <button class="filter-btn" onclick="filterCards('Nome Empresarial',this)">Nome Empresarial</button>
  <button class="filter-btn" onclick="filterCards('Sociedades Empresárias',this)">Sociedades</button>
  <button class="filter-btn" onclick="filterCards('Títulos de Crédito',this)">Títulos de Crédito</button>
  <button class="filter-btn" onclick="filterCards('Falência e Recuperação',this)">Falência e Recuperação</button>
  <button class="filter-btn" onclick="filterCards('Propriedade Industrial',this)">Propriedade Industrial</button>
</div>

<div class="main" id="quiz-container"></div>

<div class="score-panel">
  <div class="score-title">Placar</div>
  <div class="score-row ok"><span>✅ Acertos</span><span id="sc-ok">0</span></div>
  <div class="score-row nok"><span>❌ Erros</span><span id="sc-nok">0</span></div>
  <div class="score-row pct"><span>📊 Aproveit.</span><span id="sc-pct">—</span></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-emoji" id="modal-emoji">🎓</div>
    <h2 id="modal-title">Simulado Concluído!</h2>
    <div class="modal-score" id="modal-score">0/60</div>
    <p id="modal-msg"></p>
    <button class="modal-btn" onclick="closeModal()">Ver Gabarito</button>
  </div>
</div>

<script>
const questions = [
  // ──────────────────────────────────────────────────────────
  // BLOCO 1 – EMPRESÁRIO E REGISTRO
  // ──────────────────────────────────────────────────────────
  {
    id:1,t:"Sociedades Empresárias",
    q:"(FGV/OAB – Adaptada) Três médicos decidiram constituir uma sociedade do tipo limitada cujo objeto é simples, consoante a classificação das sociedades no Código Civil. Acerca da designação a ser adotada pela sociedade e sua qualificação jurídica, assinale a afirmativa correta.",
    o:[
      {l:"A",x:"Como a sociedade tem objeto simples, ela deverá obrigatoriamente adotar o nome na forma de firma, sendo vedada a denominação."},
      {l:"B",x:"Por ser constituída por profissionais liberais, a sociedade deve ser registrada como simples pura, sem possibilidade de adotar o tipo limitada."},
      {l:"C",x:"Como a sociedade simples adotou o tipo limitada, a formação de sua designação obedecerá às regras aplicáveis a esse tipo societário, sendo a sua denominação equiparada ao nome empresarial para os efeitos de proteção da lei."},
      {l:"D",x:"A sociedade simples que adota o tipo limitada converte-se automaticamente em sociedade empresária, devendo ser registrada na Junta Comercial."},
      {l:"E",x:"Os médicos não podem constituir sociedade do tipo limitada, pois profissões regulamentadas exigem o tipo sociedade simples pura."}
    ],
    c:"C",
    law:"Art. 983, 1.150 e 1.157 do CC/2002",
    exp:"A sociedade simples pode adotar qualquer dos tipos regulados nos arts. 1.039 a 1.092 do CC, inclusive a limitada. Ao fazê-lo, sua designação obedece às regras do tipo adotado e a denominação equipara-se ao nome empresarial para fins de proteção legal."
  },
  {
    id:2,t:"Nome Empresarial",
    q:"(FGV/OAB) Marco Araripe pretende iniciar uma empresa em nome próprio e mediante responsabilidade ilimitada pelas obrigações. Antes de realizar sua inscrição na Junta Comercial, Marco Araripe precisa indicar o nome que adotará para o exercício de empresa. Consoante a determinação contida no Código Civil quanto à formação de firma individual, ela deve ser constituída:",
    o:[
      {l:"A",x:"pelo nome do empresário, completo ou abreviado, aditando-lhe, se quiser, designação mais precisa da sua pessoa ou do gênero de atividade."},
      {l:"B",x:"obrigatoriamente pelo nome completo do empresário, sem qualquer abreviação, acrescido do ramo de atividade."},
      {l:"C",x:"por denominação livremente escolhida, seguida da expressão 'Empresário Individual'."},
      {l:"D",x:"pelo nome do empresário e pelo número do CPF, para fins de identificação perante terceiros."},
      {l:"E",x:"pela razão social formada pelo sobrenome do empresário, podendo incluir prenome apenas se houver homonímia registrada na mesma Junta Comercial."}
    ],
    c:"A",
    law:"Art. 1.150 e 1.156 do CC/2002",
    exp:"O art. 1.156 do CC determina que o empresário opera sob firma constituída por seu nome, completo ou abreviado, podendo adicionar designação mais precisa de sua pessoa ou do gênero de atividade. Não há obrigatoriedade de nome completo nem de indicação do CPF."
  },
  {
    id:3,t:"Sociedades Empresárias",
    q:"(FGV/OAB) Quatro pessoas naturais constituíram uma sociedade para exploração de prestação de serviços de entrega domiciliar, mas não se preocuparam em arquivar o documento particular de constituição em qualquer registro. Considerando a situação dessa sociedade e as disposições aplicáveis, assinale a afirmativa correta.",
    o:[
      {l:"A",x:"Ela se rege pelas normas da sociedade em comum e, subsidiariamente, no que forem compatíveis, pelas normas da sociedade simples."},
      {l:"B",x:"Ela é nula de pleno direito, e seus sócios não podem ser responsabilizados por dívidas contraídas."},
      {l:"C",x:"Ela se equipara a uma sociedade anônima de fato, aplicando-se a Lei 6.404/76 subsidiariamente."},
      {l:"D",x:"Ela é considerada associação civil, regida pelo Código Civil nas disposições referentes às associações."},
      {l:"E",x:"Ela deve ser registrada de ofício pela Junta Comercial assim que der início às atividades, independentemente de solicitação dos sócios."}
    ],
    c:"A",
    law:"Arts. 986 a 990 do CC/2002",
    exp:"A sociedade não registrada em nenhum registro público é denominada sociedade em comum. Rege-se pelos arts. 986 a 990 do CC e, subsidiariamente, pelas normas da sociedade simples no que for compatível. Os sócios respondem ilimitada e solidariamente pelas obrigações sociais."
  },
  {
    id:4,t:"Sociedades Empresárias",
    q:"(FGV/OAB) Andropoulos Inc. é uma sociedade constituída na Grécia, com sede em Atenas e sócios de nacionalidade grega, exceto a sócia Querência, brasileira nata, que detém participação de 80% do capital, dividido em quotas. Se essa sociedade quiser atuar no Brasil por meio de uma sucursal em São Paulo/SP, será necessário:",
    o:[
      {l:"A",x:"constituir uma nova sociedade brasileira com sede em São Paulo, pois sociedades estrangeiras não podem atuar diretamente no Brasil."},
      {l:"B",x:"obter autorização do Ministério da Fazenda e do Banco Central do Brasil, independentemente do Poder Executivo."},
      {l:"C",x:"registrar apenas na Junta Comercial de São Paulo, sendo dispensada qualquer autorização governamental por haver sócia brasileira majoritária."},
      {l:"D",x:"sujeitar-se às leis e aos tribunais brasileiros quanto às operações praticadas no Brasil, e qualquer modificação no contrato dependerá da aprovação do Poder Executivo para produzir efeitos no país."},
      {l:"E",x:"submeter-se exclusivamente às leis gregas, já que a sociedade foi constituída na Grécia, devendo apenas comunicar sua presença ao Consulado."}
    ],
    c:"D",
    law:"Arts. 1.134 e 1.137 do CC/2002",
    exp:"O art. 1.134 exige autorização do Poder Executivo para que a sociedade estrangeira funcione no Brasil. O art. 1.137 determina que a sociedade estrangeira sujeita-se às leis e tribunais brasileiros quanto às operações praticadas no Brasil, e qualquer alteração contratual depende de aprovação do Poder Executivo para produzir efeitos no país."
  },
  {
    id:5,t:"Nome Empresarial",
    q:"(FGV/OAB) Bento de Abreu e Bernardino de Campos são os únicos sócios e fundadores da sociedade empresária Abreu & Campos Ltda. Os sócios deliberaram a transformação da sociedade de limitada para companhia e lhe pediram orientação sobre o nome empresarial. Considerando algumas das regras para a formação do nome empresarial do tipo que a sociedade adotará, assinale a afirmativa correta.",
    o:[
      {l:"A",x:"A companhia adotará denominação, na qual poderá constar o(s) nome(s) do(s) fundador(es), sendo facultada a designação do objeto social."},
      {l:"B",x:"A companhia deverá obrigatoriamente adotar firma social formada pelo nome dos dois fundadores, vedada a denominação."},
      {l:"C",x:"A companhia deverá usar obrigatoriamente o nome dos dois fundadores na denominação, acrescido da expressão 'S.A.' ao final."},
      {l:"D",x:"A companhia poderá adotar firma ou denominação, desde que inclua o objeto social de forma completa."},
      {l:"E",x:"A companhia deve obrigatoriamente incluir o objeto social na denominação e é vedada a menção a nomes de pessoas."}
    ],
    c:"A",
    law:"Art. 1.160 do CC/2002 c/c art. 3.º da Lei 6.404/76",
    exp:"A sociedade anônima opera sob denominação (nunca firma). O art. 3.º da LSA permite que conste nome de fundador(es) na denominação. A designação do objeto social é facultativa, bastando a expressão 'Companhia' ou 'S.A.' (no início ou no fim)."
  },
  // ──────────────────────────────────────────────────────────
  // BLOCO 2 – TÍTULOS DE CRÉDITO
  // ──────────────────────────────────────────────────────────
  {
    id:6,t:"Títulos de Crédito",
    q:"(FGV/OAB) Em relação ao Direito Cambiário e às regras aplicáveis aos títulos de crédito, segundo a Lei Uniforme de Genebra (Decreto 57.663/66), é correto afirmar que:",
    o:[
      {l:"A",x:"o aval dado em uma letra de câmbio nunca pode ser parcial, devendo sempre cobrir o valor integral do título."},
      {l:"B",x:"o endossante que insere cláusula 'sem garantia' ainda responde pelo pagamento diante do portador de boa-fé."},
      {l:"C",x:"a prescrição da ação cambial contra o sacador da letra de câmbio ocorre em 1 ano, contado da data do vencimento."},
      {l:"D",x:"o aval dado em uma nota promissória pode ser parcial, ainda que sucessivo."},
      {l:"E",x:"a letra de câmbio à vista prescreve em 2 anos contados da data de sua emissão, independentemente de protesto."}
    ],
    c:"D",
    law:"Art. 30 e 77 da LUG (Decreto 57.663/66)",
    exp:"A LUG (aplicável à nota promissória por força do art. 77) admite expressamente o aval parcial. O aval pode ser total ou parcial e pode ser dado sucessivamente por diferentes avalistas. Esta é uma diferença importante em relação ao endosso, que não pode ser parcial."
  },
  {
    id:7,t:"Títulos de Crédito",
    q:"(FGV/OAB) Cícero sacou uma letra de câmbio em favor de Amélia, tendo designado como sacado Elísio, que acatou a ordem de pagamento. A primeira endossante realizou um endosso em preto para Dario, com proibição de novo endosso. Diante do efeito legal da cláusula de proibição de novo endosso, assinale a afirmativa correta.",
    o:[
      {l:"A",x:"A cláusula de proibição de novo endosso é inválida, pois o endosso é direito irrenunciável do portador do título."},
      {l:"B",x:"Dario não poderá transferir o título a ninguém, nem mesmo por cessão civil, em razão da proibição expressa."},

    ],
    c:"E",
    law:"Art. 1.076, I, c/c art. 1.071, VI, do CC/2002",
    exp:"A fusão é matéria de deliberação dos sócios prevista no art. 1.071, VI, do CC. Na ausência de quórum específico previsto no contrato social, o art. 1.076, I, do CC determina que as deliberações sobre operações de fusão exigem votos correspondentes a mais da metade do capital social (maioria absoluta), em primeira convocação, quando o capital está totalmente integralizado."
  },
  {
    id:59,t:"Sociedades Empresárias",
    q:"Com base nas disposições do Código Civil em vigor referentes à empresa e às sociedades empresárias, assinale a opção correta.",
    o:[
      {l:"A",x:"Somente pessoas físicas podem tomar parte na sociedade em nome coletivo, respondendo todos os sócios, solidária e ilimitadamente, pelas obrigações sociais."},

      {l:"D",x:"A sociedade em comandita por ações pode ser constituída por apenas um sócio, que assume as funções de acionista e diretor."},
      {l:"E",x:"Na sociedade simples, todos os sócios respondem subsidiária e ilimitadamente pelas obrigações sociais, independentemente de cláusula contratual."}
    ],
    c:"A",
    law:"Art. 1.039 do CC/2002",
    exp:"O art. 1.039 do CC dispõe que somente pessoas físicas (naturais) podem tomar parte na sociedade em nome coletivo, respondendo todos os sócios, solidária e ilimitadamente, pelas obrigações sociais. É vedada a participação de pessoa jurídica nesse tipo societário. Todos os sócios, sem exceção, têm responsabilidade ilimitada e solidária."
  },
  {
    id:60,t:"Falência e Recuperação",
    q:"No que se refere ao processo falimentar, assinale a opção correta.",
    o:[
      {l:"A",x:"A decretação da falência implica o vencimento antecipado de todas as obrigações do devedor e autoriza a compensação de créditos entre este e seus devedores."},

// ─── STATE ───────────────────────────────────────────────────
let answered = 0, correct = 0, wrong = 0;
let currentFilter = 'all';

// ─── RENDER ──────────────────────────────────────────────────
function renderCards(filter) {
  const container = document.getElementById('quiz-container');
  const list = filter === 'all' ? questions : questions.filter(q => q.t === filter);
  if (list.length === 0) {
    container.innerHTML = '<div class="no-results"><span style="font-size:2.5rem">🔍</span><p>Nenhuma questão encontrada para este filtro.</p></div>';
    return;
  }
  container.innerHTML = list.map((q, i) => `
    <div class="q-card" id="card-${q.id}" style="animation-delay:${i * 0.04}s">
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-topic">${q.t}</div>
        <div class="q-status" id="status-${q.id}"></div>
      </div>
      <div class="q-body">
        <p class="q-text">${q.q}</p>
        <div class="options" id="opts-${q.id}">
          ${q.o.map(o => `
            <button class="option" id="opt-${q.id}-${o.l}" onclick="answer(${q.id},'${o.l}')">
              <span class="opt-label">${o.l})</span>
              <span>${o.x}</span>
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="fb-${q.id}"></div>
      </div>
    </div>
  `).join('');
}

// ─── ANSWER HANDLER ──────────────────────────────────────────
function answer(qid, chosen) {
  const q = questions.find(x => x.id === qid);
  const opts = document.querySelectorAll(`#opts-${qid} .option`);
  const fb = document.getElementById(`fb-${qid}`);
  const card = document.getElementById(`card-${qid}`);
  const status = document.getElementById(`status-${qid}`);
  const isCorrect = chosen === q.c;

  opts.forEach(btn => {
    btn.disabled = true;
    const lbl = btn.querySelector('.opt-label').textContent.replace(')','');
    if (lbl === q.c) btn.classList.add('correct');
    if (lbl === chosen && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) {
    correct++;
    card.classList.add('answered-correct');
    status.textContent = '✅';
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✅ Resposta correta!</strong>${q.exp}<div class="law-ref">📚 Base legal: ${q.law}</div>`;
  } else {
    wrong++;
    card.classList.add('answered-wrong');
    status.textContent = '❌';
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>❌ Resposta incorreta. A alternativa correta é a ${q.c}.</strong>${q.exp}<div class="law-ref">📚 Base legal: ${q.law}</div>`;
  }

  answered++;
  updateScore();

  if (answered === questions.length && currentFilter === 'all') {
    setTimeout(showModal, 800);
  }
}

// ─── SCORE UPDATE ─────────────────────────────────────────────
function updateScore() {
  document.getElementById('sc-ok').textContent = correct;
  document.getElementById('sc-nok').textContent = wrong;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('sc-pct').textContent = answered > 0 ? pct + '%' : '—';
  const total = currentFilter === 'all' ? questions.length : questions.filter(q => q.t === currentFilter).length;
  document.getElementById('prog-label').textContent = `${answered} de ${total} respondidas`;
  document.getElementById('prog-pct').textContent = Math.round((answered / total) * 100) + '%';
  document.getElementById('prog-fill').style.width = (answered / total * 100) + '%';
}

// ─── FILTER ───────────────────────────────────────────────────
function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  answered = 0; correct = 0; wrong = 0;
  updateScore();
  renderCards(filter);
}

// ─── MODAL ───────────────────────────────────────────────────
function showModal() {
  const pct = Math.round((correct / questions.length) * 100);
  let emoji = '😅', msg = 'Continue estudando!';
  if (pct >= 90) { emoji = '🏆'; msg = 'Desempenho excepcional! Você está pronto para a OAB!'; }
  else if (pct >= 75) { emoji = '🎓'; msg = 'Ótimo resultado! Aprovação muito provável!'; }
  else if (pct >= 60) { emoji = '📚'; msg = 'Bom resultado! Revise os temas com mais erros.'; }
  else { emoji = '💪'; msg = 'Não desanime! Revise o conteúdo e tente novamente.'; }
  document.getElementById('modal-emoji').textContent = emoji;
  document.getElementById('modal-score').textContent = `${correct}/60 (${pct}%)`;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ─── INIT ────────────────────────────────────────────────────
renderCards('all');
updateScore();
</script>
